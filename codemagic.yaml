workflows:
  ios-build-ipa:
    name: iOS Build IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      cocoapods: default
      groups:
        - neon_credentials
    scripts:
      - name: Generate Config.swift from env variable
        script: |
          cat > AutoLog/App/Config.swift <<'SWIFTEOF'
          import Foundation

          struct Config {
              static let neonConnectionString = "$NEON_CONNECTION_STRING"

              static var neonBaseURL: String {
                  guard let url = URLComponents(string: neonConnectionString.replacingOccurrences(of: "postgresql://", with: "https://")) else { return "" }
                  return "https://\(url.host ?? "")/sql"
              }

              static var neonAPIKey: String {
                  guard let url = URLComponents(string: neonConnectionString.replacingOccurrences(of: "postgresql://", with: "https://")) else { return "" }
                  return url.password ?? ""
              }

              static let urlSessionTimeout: TimeInterval = 8
              static let bleReconnectInterval: TimeInterval = 30
              static let obdCommandTimeout: TimeInterval = 5
              static let maxRetryCount = 10
          }
          SWIFTEOF
          # Now substitute the actual env var value
          sed -i '' "s|\$NEON_CONNECTION_STRING|${NEON_CONNECTION_STRING}|g" AutoLog/App/Config.swift

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Build unsigned archive for device
        script: |
          xcodebuild archive \
            -project AutoLog.xcodeproj \
            -scheme AutoLog \
            -destination "generic/platform=iOS" \
            -archivePath build/AutoLog.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      - name: Package IPA from archive
        script: |
          APP_PATH="build/AutoLog.xcarchive/Products/Applications/AutoLog.app"
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AutoLog.ipa Payload
          echo "IPA created at build/AutoLog.ipa"
          ls -lh ../AutoLog.ipa

    artifacts:
      - build/AutoLog.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
