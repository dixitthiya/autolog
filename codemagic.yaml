workflows:
  ios-build-ipa:
    name: iOS Build IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      cocoapods: default
      groups:
        - neon_credentials
    scripts:
      - name: Generate Config.swift from env variables
        script: |
          cat > AutoLog/App/Config.swift <<EOF
          import Foundation

          struct Config {
              static let neonBaseURL = "${NEON_BASE_URL}"
              static let neonAPIKey = "${NEON_API_KEY}"
              static let urlSessionTimeout: TimeInterval = 8
              static let bleReconnectInterval: TimeInterval = 30
              static let obdCommandTimeout: TimeInterval = 5
              static let maxRetryCount = 10
          }
          EOF
          echo "Config.swift generated with base URL: ${NEON_BASE_URL}"

      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Build unsigned archive for device
        script: |
          xcodebuild archive \
            -project AutoLog.xcodeproj \
            -scheme AutoLog \
            -destination "generic/platform=iOS" \
            -archivePath build/AutoLog.xcarchive \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty

      - name: Package IPA from archive
        script: |
          APP_PATH="build/AutoLog.xcarchive/Products/Applications/AutoLog.app"
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AutoLog.ipa Payload
          echo "IPA created at build/AutoLog.ipa"
          ls -lh ../AutoLog.ipa

    artifacts:
      - build/AutoLog.ipa

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
