name: AutoLog
options:
  bundleIdPrefix: com.autolog
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: AutoLog/Info.plist

targets:
  AutoLog:
    type: application
    platform: iOS
    sources:
      - path: AutoLog
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autolog.app
        INFOPLIST_FILE: AutoLog/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    info:
      path: AutoLog/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "AutoLog connects to your OBD adapter to log mileage"
        NSBluetoothPeripheralUsageDescription: "AutoLog connects to your OBD adapter to log mileage"
        UIBackgroundModes:
          - bluetooth-central
        UILaunchScreen: {}

  AutoLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AutoLogTests
    dependencies:
      - target: AutoLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autolog.tests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AutoLog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AutoLog"
        BUNDLE_LOADER: "$(TEST_HOST)"
